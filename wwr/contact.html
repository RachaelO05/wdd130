<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us Dry Oar</title>
    <meta name="description"
      content="Contact page for a website for a white water rafting company.">
    <meta name="author" content="Rachael O'Moore">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <nav class="menu">
            <img src="images/wwr-logo.png" alt="wwr logo">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Dry Oar White Water Rafting</h1>
        <div class="info">
            <p>123 Main Road</p>
            <p>Johannesburg, Gauteng</p>
            <p>+12 345 678 9100</p>
            <p>info@dryoar.com</p>
        </div>
        <div class="map-form">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d1507.4830821934565!2d28.03257227025559!3d-26.019836189050768!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sza!4v1775132922861!5m2!1sen!2sza"
              width="600" height="450" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
            <form>
                <div>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email">
                </div>

                <div class="radio-group">
                    <p>Message purpose</p>
                    <div class="radio-options">
                        <div>
                            <input type="radio" id="radio1" name="radio" value="General Inquiry">
                            <label for="radio1">General inquiry</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="radio2" name="radio"
                              value="Reservation Question">
                            <label for="radio2">Reservation Question</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="radio3" name="radio" value="Website Suggestion">
                            <label for="radio3">Website Suggestion</label>
                        </div>
                    </div>
                </div>
                <div>
                    <label for="message">Message</label>
                    <textarea id="message" name="message"></textarea>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit">Get in Touch!</button>
            </form>
        </div>

        <section class="employee">
            <h2>We Are Here to Serve You</h2>
            <figure>
                <img src="images/employee1.jpg" alt="Employee Profile Camp Manager">
                <figcaption>Lisa Smith Camp Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Employee Profile Main Photographer">
                <figcaption>Lewis Green Main Photographer</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Employee Profile Rafting Guide">
                <figcaption>Emil Lorenzo Rafting Guide</figcaption>
            </figure>
        </section>
    </main>

    <footer>
        <p>© 2026 🚣Dry Oar White Water Rafting🚣 Rachael O'Moore</p>
        <nav class="socialmedia">
            <a href="www.facebook.com"> <img src="images/facebook-icon.png" alt="Facebook icon">
            </a>
            <a href="www.instagram.com"> <img src="images/instagram-icon.png" alt="Instagram icon">
            </a>
            <a href="www.linkedin.com"> <img src="images/linkedin-icon.png" alt="Linkedin icon">
            </a>
        </nav>
    </footer>
</body>

</html>
